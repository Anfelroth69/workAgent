name: Deploy to Render

on:
  push:
    branches: [main]

jobs:
  preflight:
    name: Pre-flight Validation
    runs-on: ubuntu-latest
    outputs:
      deploy_id: ${{ steps.trigger.outputs.deploy_id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run preflight
        run: python3 skills/devops_qa/scripts/preflight.py

      - name: Debug secrets availability
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "FAIL: RENDER_DEPLOY_HOOK secret is empty or not set"
            exit 1
          fi
          echo "RENDER_DEPLOY_HOOK is set (${RENDER_DEPLOY_HOOK:0:40}...)"
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}

      - name: Trigger Render deploy
        id: trigger
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          echo "Triggering deploy..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$RENDER_DEPLOY_HOOK")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP $HTTP_CODE — Response: $BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            exit 1
          fi
          DEPLOY_ID=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('deploy',{}).get('id',''))" 2>/dev/null || echo "")
          if [ -z "$DEPLOY_ID" ]; then
            echo "Failed to extract deploy ID from response"
            exit 1
          fi
          echo "deploy_id=$DEPLOY_ID" >> "$GITHUB_OUTPUT"
          echo "Deploy triggered: $DEPLOY_ID"

  monitor:
    name: Monitor Deploy
    needs: preflight
    runs-on: ubuntu-latest
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      SERVICE_ID: srv-d8tvft1o3t8c73c4e7tg
    steps:
      - name: Wait for deploy to complete
        run: |
          DEPLOY_ID="${{ needs.preflight.outputs.deploy_id }}"
          echo "Monitoring deploy $DEPLOY_ID..."
          for i in $(seq 20); do
            STATUS=$(curl -s "https://api.render.com/v1/services/$SERVICE_ID/deploys/$DEPLOY_ID" \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Accept: application/json" \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))")
            echo "Attempt $i/20: $STATUS"
            case "$STATUS" in
              live)           echo "Deploy live!"; exit 0 ;;
              build_failed)   echo "Build failed"; exit 1 ;;
              cancel|deactivated) echo "Deploy cancelled"; exit 1 ;;
            esac
            sleep 30
          done
          echo "Timeout waiting for deploy"
          exit 1

  smoke_test:
    name: Smoke Test
    needs: monitor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run smoke test
        run: |
          pip install pyyaml
          python3 skills/devops_qa/scripts/smoke_test.py \
            --url https://one-api-picoclaw.onrender.com
