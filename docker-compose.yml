version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: oneapi
      POSTGRES_USER: oneapi_user
      POSTGRES_PASSWORD: oneapi_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oneapi_user -d oneapi"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      SQL_DSN: postgres://oneapi_user:oneapi_pass@postgres:5432/oneapi
      SESSION_SECRET: dev-session-secret-cambiar-en-produccion
      INITIAL_ROOT_TOKEN: dev-root-token-cambiar-en-produccion
      PICOCLAW_API_KEY: dev-picoclaw-key-cambiar-en-produccion
      PORT: "3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
